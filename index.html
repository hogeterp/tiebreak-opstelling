<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b7a3e">
  <title>Tiebreak-opstelling</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<header class="topbar">
  <div><h1>🎾 Tiebreak-opstelling</h1><p>Dinsdag 20:00–21:30</p></div>
  <button class="iconbtn" id="refreshBtn" title="Vernieuwen">↻</button>
</header>
<nav class="tabs" aria-label="Hoofdnavigatie">
  <button data-tab="participant" class="active">Deelnemer</button>
  <button data-tab="organizer">Organisator</button>
  <button data-tab="players">Spelers</button>
</nav>
<main>
<section id="participant" class="panel active">
  <div class="card compact">
    <label>Wie ben je?</label>
    <select id="participantSelect"><option value="">Kies je naam</option></select>
    <p id="profileHint" class="hint"></p>
  </div>
  <div id="upcomingParticipant"></div>
</section>

<section id="organizer" class="panel">
  <div class="summary-grid" id="organizerSummary"></div>
  <div class="card compact">
    <div class="row between"><h2>Speelavond</h2><select id="orgDate"></select></div>
    <div class="grid2">
      <label>Aantal banen<input id="courtCount" type="number" min="1" max="10" value="5"></label>
      <label>Max. spelers<input id="maxPlayers" type="text" readonly></label>
    </div>
    <button id="saveEveningBtn">Instellingen opslaan</button>
  </div>
  <div class="card compact">
    <h2>Aanmeldingen</h2>
    <div id="organizerResponses"></div>
  </div>
  <div class="card compact">
    <div class="row between"><h2>Deelnemersveld</h2><button id="proposeFieldBtn">Voorstel</button></div>
    <div class="two-columns">
      <div><h3>Speelt</h3><div id="playingList" class="move-list"></div></div>
      <div><h3>Reserve</h3><div id="reserveList" class="move-list"></div></div>
    </div>
    <div class="row wrap">
      <button id="generateScheduleBtn">Automatische indeling</button>
      <button id="manualScheduleBtn" class="secondary">Handmatig maken</button>
    </div>
    <div id="scheduleOutput"></div>
  </div>
  <div class="card compact">
    <h2>WhatsApp</h2>
    <div class="button-grid">
      <button data-wa="invite">Uitnodiging</button>
      <button data-wa="spots">Nog spelers gezocht</button>
      <button data-wa="urgent" class="danger">Dringend invaller</button>
      <button data-wa="reminder">Herinnering</button>
      <button data-wa="details">Gegevens aanvullen</button>
      <button data-wa="schedule">Definitieve indeling</button>
    </div>
  </div>
  <details class="card compact">
    <summary><strong>Statistieken</strong></summary>
    <div id="statistics"></div>
    <div class="row wrap">
      <button id="exportCsvBtn" class="secondary">CSV export</button>
      <button id="exportXlsxBtn" class="secondary">Excel export</button>
      <button id="backupBtn" class="secondary">Back-up</button>
    </div>
  </details>
  <details class="card compact">
    <summary><strong>Logboek</strong></summary>
    <div id="logbook"></div>
  </details>
</section>

<section id="players" class="panel">
  <div class="card compact">
    <h2>Speler toevoegen of wijzigen</h2>
    <input type="hidden" id="editPlayerId">
    <div class="grid2">
      <label>Voornaam<input id="firstName"></label>
      <label>Achternaam<input id="lastName"></label>
      <label>Geslacht<select id="gender"><option value=""></option><option>Man</option><option>Vrouw</option></select></label>
      <label>KNLTB-dubbelrating<input id="rating" type="number" min="1" max="9" step="0.1"></label>
    </div>
    <div class="row wrap"><button id="savePlayerBtn">Opslaan</button><button id="cancelEditBtn" class="secondary hidden">Annuleren</button></div>
  </div>
  <div class="card compact">
    <h2>Bulkimport</h2>
    <p class="hint">Tekst: één speler per regel. Of: Voornaam;Achternaam;Geslacht;Rating</p>
    <textarea id="bulkText" rows="6" placeholder="Carel;Jacobs;Man;6.4"></textarea>
    <label class="filelabel">CSV/Excel kiezen<input id="importFile" type="file" accept=".csv,.xlsx,.xls"></label>
    <div class="row wrap"><button id="previewImportBtn">Voorbeeld</button><button id="confirmImportBtn" class="secondary" disabled>Importeren</button></div>
    <div id="importPreview"></div>
  </div>
  <div class="card compact">
    <h2>Spelerslijst</h2>
    <div id="playersList"></div>
  </div>
</section>
</main>

<div id="waModal" class="modal hidden" role="dialog" aria-modal="true">
  <div class="modalbox">
    <div class="row between"><h2>WhatsApp-voorbeeld</h2><button id="closeWaBtn" class="iconbtn">✕</button></div>
    <textarea id="waPreview" rows="14"></textarea>
    <div class="row wrap"><button id="openWaBtn">Open WhatsApp</button><button id="copyWaBtn" class="secondary">Kopieer tekst</button></div>
  </div>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
